                    - paragraph [ref=e207]:
                      - text: PR
                      - link "#77" [ref=e208] [cursor=pointer]:
                        - /url: https://github.com/lessweb/deepcode-cli/pull/77
                      - text: 修复 Windows CI 时，将 McpClient 的 spawn 调用从：
                    - generic [ref=e209]:
                      - generic [ref=e210]: "const cmd = [this.command + \".cmd\", ...args].join(\" \"); spawn(cmd, [], { shell: true });"
                      - button "Copy code to clipboard" [ref=e212] [cursor=pointer]:
                        - img [ref=e213]
                    - paragraph [ref=e216]: 改为：
                    - generic [ref=e217]:
                      - generic [ref=e218]: "spawn(this.command, args, { shell: true });"
                      - button "Copy code to clipboard" [ref=e220] [cursor=pointer]:
                        - img [ref=e221]
                    - paragraph [ref=e224]:
                      - text: 目的是去掉强制拼接
                      - code [ref=e225]: .cmd
                      - text: 后缀，让 cmd.exe 通过 PATHEXT 环境变量自动解析
                      - code [ref=e226]: npx
                      - text: →
                      - code [ref=e227]: npx.cmd
                      - text: 。但 Node.js 在
                      - code [ref=e228]: "shell: true"
                      - text: 模式下直接传 args 数组会触发 DEP0190 警告——Node 只做简单拼接不转义，存在注入风险。
                    - heading "修复方案" [level=2] [ref=e229]
                    - paragraph [ref=e230]: 将 args 手动拼成字符串后传入，避免触发 DEP0190：
                    - generic [ref=e231]:
                      - generic [ref=e232]:
                        - generic [ref=e233]: "- this.process = spawn(this.command, args, {"
                        - generic [ref=e234]: "+ this.process = spawn([this.command, ...args].join(\" \"), [], {"
                        - text: "stdio: [\"pipe\", \"pipe\", \"pipe\"], env: childEnv, shell: true, windowsHide: true, });"
                      - button "Copy code to clipboard" [ref=e236] [cursor=pointer]:
                        - img [ref=e237]
                    - paragraph [ref=e240]:
                      - text: 逻辑等价——cmd.exe 仍通过 PATHEXT 解析命令，不会触发 DEP0190，也不会有之前的
