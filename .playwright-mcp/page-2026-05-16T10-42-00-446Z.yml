                    - paragraph [ref=e197]: 启动 deepcode 时出现 Node.js 废弃警告：
                    - generic [ref=e198]:
                      - code [ref=e200]: "(node:123548) [DEP0190] DeprecationWarning: Passing args to a child process with shell option true can lead to security vulnerabilities, as the arguments are not escaped, only concatenated."
