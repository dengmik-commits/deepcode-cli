                        - generic [ref=e288]:
                          - generic [ref=e289]: "// Windows branch this.process = spawn(this.command, args, { shell: true, ... });"
                          - button "Copy code to clipboard" [ref=e291] [cursor=pointer]:
                            - img [ref=e292]
                      - listitem [ref=e295]:
                        - strong [ref=e296]: 原理
                        - text: ：
                        - code [ref=e297]: "shell: true"
                        - text: 通过
                        - code [ref=e298]: cmd.exe /c <command>
                        - text: 执行命令。
                        - code [ref=e299]: cmd.exe
                        - text: 会自动通过 PATHEXT 环境变量查找匹配的可执行文件（
                        - code [ref=e300]: npx
                        - text: →
                        - code [ref=e301]: npx.cmd
                        - text: 、
                        - code [ref=e302]: node
                        - text: →
                        - code [ref=e303]: node.exe
                        - text: ），无需手动拼接
                        - code [ref=e304]: .cmd
                        - text: 后缀。
                      - listitem [ref=e305]:
                        - strong [ref=e306]: 影响
                        - text: ：修正了 Windows 上所有使用
                        - code [ref=e307]: process.execPath
                        - text: 启动 MCP 服务器的测试路径。npx 命令也能正常通过 PATHEXT 解析。没有功能回归。
