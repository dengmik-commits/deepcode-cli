                    - heading "背景" [level=2] [ref=e232]
                    - paragraph [ref=e233]: 项目的 CI pipeline 在 Windows 平台全面失败。本 PR 修复了所有 Windows CI 相关的兼容性问题，使 Windows 与 Ubuntu/macOS 一样通过全部检查。
                    - separator [ref=e234]
                    - heading "改动详解" [level=2] [ref=e235]
                    - heading "1. .gitattributes — 新增" [level=3] [ref=e236]:
                      - text: "1."
                      - code [ref=e237]: .gitattributes
                      - text: — 新增
                    - list [ref=e238]:
                      - listitem [ref=e239]:
                        - strong [ref=e240]: 位置
                        - text: ：项目根目录
                      - listitem [ref=e241]:
                        - strong [ref=e242]: 原因
                        - text: ：
                        - code [ref=e243]: .prettierrc
                        - text: 配置了
                        - code [ref=e244]: "\"endOfLine\": \"lf\""
                        - text: ，要求所有源文件使用 LF 行尾。但在 Windows 上，Git 默认将文件 checkout 为 CRLF，导致
                        - code [ref=e245]: prettier --check
                        - text: 认为全部 71 个源文件格式不正确，CI 在
                        - code [ref=e246]: format:check
                        - text: 步骤直接失败。
                      - listitem [ref=e247]:
                        - strong [ref=e248]: 内容
                        - text: ：
                        - code [ref=e249]: "* text=auto eol=lf"
                      - listitem [ref=e250]:
                        - strong [ref=e251]: 影响
                        - text: ：Git 在所有平台（包括 Windows）checkout 时自动转换行尾为 LF，prettier 格式检查通过
                    - separator [ref=e252]
                    - heading "2. .github/workflows/ci.yml — 修改" [level=3] [ref=e253]:
                      - text: "2."
                      - code [ref=e254]: .github/workflows/ci.yml
                      - text: — 修改
                    - list [ref=e255]:
                      - listitem [ref=e256]:
                        - strong [ref=e257]: 改动
                        - text: ：在 node-version matrix 中恢复 Node 20
                      - listitem [ref=e258]:
                        - strong [ref=e259]: 当前 matrix
                        - text: ：Node 20 / 22 / 24
                      - listitem [ref=e260]:
                        - strong [ref=e261]: 影响
                        - text: ：CI 覆盖三个 LTS 版本
                    - separator [ref=e262]
                    - heading "3. src/mcp/mcp-client.ts — 修改生产代码" [level=3] [ref=e263]:
