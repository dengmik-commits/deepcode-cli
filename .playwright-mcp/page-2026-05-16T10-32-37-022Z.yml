                      - code [ref=e264]: src/mcp/mcp-client.ts
                      - text: — 修改生产代码
                    - list [ref=e265]:
                      - listitem [ref=e266]:
                        - strong [ref=e267]: 原因
                        - text: ：MCP client 的
                        - code [ref=e268]: connect()
                        - text: 方法在 Windows 分支中，将
                        - code [ref=e269]: this.command
                        - text: 强制追加
                        - code [ref=e270]: .cmd
                        - text: 后缀再拼成单字符串通过
                        - code [ref=e271]: cmd.exe
                        - text: 执行。但当
                        - code [ref=e272]: command
                        - text: 本身是一个完整的可执行文件路径（如
                        - code [ref=e273]: process.execPath
                        - text: 返回的
                        - code [ref=e274]: C:\...\node.exe
                        - text: ），追加
                        - code [ref=e275]: .cmd
                        - text: 后变成
                        - code [ref=e276]: node.exe.cmd
                        - text: ——这个文件不存在，导致所有 MCP 相关测试全部抛出启动失败。
                      - listitem [ref=e277]:
                        - strong [ref=e278]: 改动前
                        - text: ：
                        - generic [ref=e279]:
                          - generic [ref=e280]: "// Windows branch const cmd = [this.command + \".cmd\", ...args].join(\" \"); this.process = spawn(cmd, [], { shell: true, ... });"
